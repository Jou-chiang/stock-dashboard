name: Fetch Pool Scores

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 台灣時間 17:00（UTC+8，weekdays）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run pool scores script
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python fetch_pool_scores.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git stash -u
          git pull --rebase origin main
          git stash pop
          git add history_data.csv pool_scores.json
          git diff --staged --quiet || git commit -m "Update pool scores"
          git push origin main
