name: Fetch Stock Prices

on:
  schedule:
    - cron: '*/5 1-5 * * 1-5'  # 台灣時間 9:00-13:30（UTC+8）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install shioaji

      - name: Run fetch script
        env:
          SHIOAJI_API_KEY: ${{ secrets.SHIOAJI_API_KEY }}
          SHIOAJI_SECRET_KEY: ${{ secrets.SHIOAJI_SECRET_KEY }}
        run: python fetch_prices.py

      - name: Commit and push prices.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "Update prices"
          git pull --rebase origin main
          git push origin main --force
