<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>績優股雷達｜Dashboard B</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0e10;--bg2:#131619;--bg3:#1a1e22;--bg4:#212730;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaed;--text2:#8b9099;--text3:#565c66;
  --amber:#f0a03a;--amber2:#7a4e12;
  --green:#3fc97c;--red:#f25f5f;--blue:#5ba3f5;
  --purple:#b072f2;--neon:#00e5ff;--warn:#ff6d00;
  --mono:'IBM Plex Mono',monospace;--sans:'Noto Sans TC',sans-serif;
  --r:6px;--rl:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:999;}
.layout{max-width:1400px;margin:0 auto;padding:0 20px 60px;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-bottom:1px solid var(--border);margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.brand-title{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--amber);}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.07em;margin-top:2px;}
.badge{font-family:var(--mono);font-size:10px;background:rgba(176,114,242,.15);border:1px solid rgba(176,114,242,.3);color:var(--purple);padding:3px 8px;border-radius:20px;}

/* token */
.section{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:16px 20px;margin-bottom:16px;}
.section-title{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.08em;margin-bottom:10px;text-transform:uppercase;}
.token-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.input-field{flex:1;min-width:220px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px;outline:none;transition:border-color .2s;}
.input-field:focus{border-color:var(--amber);}
.input-field::placeholder{color:var(--text3);}
.btn{font-family:var(--mono);font-size:12px;padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--amber);color:#000;font-weight:500;}
.btn-primary:hover{background:#d4891f;}
.btn-primary:disabled{background:var(--amber2);color:#666;cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--text2);}

/* watchlist */
.watchlist-wrap{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.watchlist-input{flex:1;min-width:300px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;outline:none;resize:vertical;min-height:60px;transition:border-color .2s;}
.watchlist-input:focus{border-color:var(--amber);}
.watchlist-hint{font-size:11px;color:var(--text3);margin-top:6px;}
.watchlist-hint span{color:var(--amber);}

/* score legend */
.score-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.score-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);font-family:var(--mono);}
.score-dot{width:8px;height:8px;border-radius:50%;}

/* progress */
.progress-wrap{display:none;margin-bottom:16px;}
.progress-bar-bg{background:var(--bg3);border-radius:4px;height:4px;overflow:hidden;}
.progress-bar{height:100%;background:var(--amber);border-radius:4px;transition:width .3s;}
.progress-text{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:6px;}

/* results */
.result-zone{display:none;}
.zone-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;margin-top:24px;}
.zone-title{font-family:var(--mono);font-size:13px;font-weight:500;}
.zone-count{font-family:var(--mono);font-size:11px;color:var(--text3);}
.zone-5 .zone-title{color:#ffd700;}
.zone-4 .zone-title{color:var(--green);}
.zone-3 .zone-title{color:var(--text2);}

/* card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.stock-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;transition:border-color .2s;position:relative;overflow:hidden;}
.stock-card:hover{border-color:var(--border2);}
.stock-card.score-5{border-color:rgba(255,215,0,.25);}
.stock-card.score-5::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#ffd700,#f0a03a);}
.stock-card.score-4{border-color:rgba(63,201,124,.2);}
.stock-card.score-4::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--green);}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.card-id{font-family:var(--mono);font-size:11px;color:var(--text3);}
.card-name{font-size:15px;font-weight:500;color:var(--text);margin-top:2px;}
.score-badge{font-family:var(--mono);font-size:18px;font-weight:500;}
.score-badge.s5{color:#ffd700;}
.score-badge.s4{color:var(--green);}
.score-badge.s3{color:var(--text2);}
.fire-badge{font-size:14px;margin-left:4px;}

.card-price-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.card-price{font-family:var(--mono);font-size:20px;font-weight:500;}
.card-chg{font-family:var(--mono);font-size:12px;padding:2px 6px;border-radius:4px;}
.card-chg.up{background:rgba(242,95,95,.15);color:var(--red);}
.card-chg.dn{background:rgba(63,201,124,.1);color:var(--green);}

/* criteria chips */
.criteria-row{display:flex;flex-wrap:wrap;gap:5px;}
.chip{font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:4px;border:1px solid;}
.chip.pass{background:rgba(63,201,124,.08);border-color:rgba(63,201,124,.25);color:var(--green);}
.chip.fail{background:rgba(255,255,255,.03);border-color:var(--border);color:var(--text3);}

/* card footer */
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.card-meta{font-family:var(--mono);font-size:10px;color:var(--text3);}
.btn-add{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid rgba(240,160,58,.3);background:rgba(240,160,58,.07);color:var(--amber);cursor:pointer;transition:all .2s;}
.btn-add:hover{background:rgba(240,160,58,.15);}

/* empty / error */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);font-family:var(--mono);font-size:12px;}
.empty-icon{font-size:32px;margin-bottom:12px;}
.error-msg{background:rgba(242,95,95,.08);border:1px solid rgba(242,95,95,.2);color:var(--red);padding:10px 14px;border-radius:var(--r);font-family:var(--mono);font-size:11px;margin-bottom:12px;}

/* summary bar */
.summary-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;gap:24px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.summary-item{font-family:var(--mono);font-size:11px;}
.summary-label{color:var(--text3);}
.summary-val{color:var(--text);margin-left:6px;}
.summary-val.gold{color:#ffd700;}
.summary-val.green{color:var(--green);}
</style>
</head>
<body>
<div class="layout">

  <!-- topbar -->
  <div class="topbar">
    <div>
      <div class="brand-title">📡 績優股雷達</div>
      <div class="brand-sub">DASHBOARD B · 五星積分篩選系統</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span class="badge">MVP v1.0</span>
      <a href="index.html" style="font-family:var(--mono);font-size:11px;color:var(--text3);text-decoration:none;border:1px solid var(--border2);padding:5px 10px;border-radius:var(--r);">← 儀表板 A</a>
    </div>
  </div>

  <!-- token -->
  <div class="section">
    <div class="section-title">FinMind Token</div>
    <div class="token-row">
      <input id="token" class="input-field" type="password" placeholder="貼上你的 FinMind Token" autocomplete="off">
      <button class="btn btn-ghost" onclick="saveToken()">儲存</button>
      <span id="token-status" style="font-family:var(--mono);font-size:11px;color:var(--text3);"></span>
    </div>
  </div>

  <!-- watchlist -->
  <div class="section">
    <div class="section-title">觀察清單（輸入股票代號，逗號或換行分隔）</div>
    <div class="watchlist-wrap">
      <textarea id="watchlist" class="watchlist-input" placeholder="例：2330,2605,2481,6213,8932&#10;建議 10–15 支"></textarea>
    </div>
    <div class="watchlist-hint">💡 建議控制在 <span>10–15 支</span>，太多會超過 FinMind 免費版限制</div>
  </div>

  <!-- scoring legend -->
  <div class="section">
    <div class="section-title">積分條件說明（滿分 5 分）</div>
    <div class="score-legend">
      <div class="score-item"><div class="score-dot" style="background:#5ba3f5"></div>① 投信連買 ≥ 3天（籌碼熱度）</div>
      <div class="score-item"><div class="score-dot" style="background:#b072f2"></div>② 投信持股 &lt; 10%（成長空間）</div>
      <div class="score-item"><div class="score-dot" style="background:#3fc97c"></div>③ K值 &lt; 50（安全位階）</div>
      <div class="score-item"><div class="score-dot" style="background:#f0a03a"></div>④ 量 &gt; 均量 1.5倍（點火動能）</div>
      <div class="score-item"><div class="score-dot" style="background:#00e5ff"></div>⑤ 均線糾結 MA5-MA20 &lt; 3%（起漲型態）</div>
    </div>
  </div>

  <!-- scan button -->
  <div style="display:flex;gap:8px;margin-bottom:20px;">
    <button id="scan-btn" class="btn btn-primary" onclick="startScan()" style="font-size:13px;padding:10px 28px;">🔍 開始掃描</button>
    <button class="btn btn-ghost" onclick="clearResults()">清除結果</button>
  </div>

  <!-- progress -->
  <div id="progress-wrap" class="progress-wrap">
    <div class="progress-bar-bg"><div id="progress-bar" class="progress-bar" style="width:0%"></div></div>
    <div id="progress-text" class="progress-text">準備中...</div>
  </div>

  <!-- error -->
  <div id="error-area"></div>

  <!-- results -->
  <div id="result-zone" class="result-zone">
    <div id="summary-bar" class="summary-bar"></div>

    <div id="zone5">
      <div class="zone-header zone-5">
        <div class="zone-title">🏆 5分區 — Must Watch</div>
        <div class="zone-count" id="count5"></div>
      </div>
      <div id="cards5" class="card-grid"></div>
    </div>

    <div id="zone4">
      <div class="zone-header zone-4">
        <div class="zone-title">⚔️ 4分區 — Strong Potential</div>
        <div class="zone-count" id="count4"></div>
      </div>
      <div id="cards4" class="card-grid"></div>
    </div>

    <div id="zone3">
      <div class="zone-header zone-3">
        <div class="zone-title">📋 3分以下 — 觀察中</div>
        <div class="zone-count" id="count3"></div>
      </div>
      <div id="cards3" class="card-grid"></div>
    </div>
  </div>

</div>

<script>
// ── 工具函式 ────────────────────────────────────────────
function getToken(){ return document.getElementById('token').value.trim() || localStorage.getItem('finmind_token') || ''; }
function saveToken(){
  const t = document.getElementById('token').value.trim();
  if(!t){ showTokenStatus('請輸入 Token', false); return; }
  localStorage.setItem('finmind_token', t);
  showTokenStatus('✓ 已儲存', true);
}
function showTokenStatus(msg, ok){
  const el = document.getElementById('token-status');
  el.textContent = msg;
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
}

// 初始化：讀取儲存的 token 和觀察清單
window.addEventListener('load', ()=>{
  const saved = localStorage.getItem('finmind_token');
  if(saved){ document.getElementById('token').value = saved; showTokenStatus('✓ 已載入', true); }
  const savedList = localStorage.getItem('watchlist_b');
  if(savedList){ document.getElementById('watchlist').value = savedList; }
});

function parseWatchlist(){
  const raw = document.getElementById('watchlist').value;
  localStorage.setItem('watchlist_b', raw);
  return [...new Set(
    raw.split(/[\n,，\s]+/)
       .map(s => s.trim())
       .filter(s => /^\d{4,6}$/.test(s))
  )];
}

// ── FinMind API ─────────────────────────────────────────
const FINMIND = 'https://api.finmindtrade.com/api/v4/data';

async function fetchFinMind(dataset, stockId, startDate){
  const token = getToken();
  const url = `${FINMIND}?dataset=${dataset}&data_id=${stockId}&start_date=${startDate}&token=${token}`;
  const r = await fetch(url);
  const j = await r.json();
  if(j.status !== 200) throw new Error(j.msg || 'FinMind error');
  return j.data;
}

function dateNDaysAgo(n){
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0,10);
}

// ── KDJ 計算 ────────────────────────────────────────────
function calcKDJ(prices){
  // prices: [{date,open,high,low,close,volume}] 由舊到新
  let k=50, d=50;
  for(let i=0; i<prices.length; i++){
    const window = prices.slice(Math.max(0,i-8), i+1);
    const highs = window.map(p=>p.high);
    const lows  = window.map(p=>p.low);
    const hh = Math.max(...highs);
    const ll = Math.min(...lows);
    const rsv = hh===ll ? 50 : (prices[i].close - ll)/(hh - ll)*100;
    k = k*(2/3) + rsv*(1/3);
    d = d*(2/3) + k*(1/3);
  }
  return { k, d, j: 3*k - 2*d };
}

function calcMA(prices, n){
  if(prices.length < n) return null;
  const slice = prices.slice(-n);
  return slice.reduce((s,p)=>s+p.close, 0) / n;
}

function calcAvgVol(prices, n){
  if(prices.length < n+1) return null;
  const slice = prices.slice(-(n+1), -1); // 排除今天
  return slice.reduce((s,p)=>s+p.volume, 0) / n;
}

// ── 分析單支股票 ────────────────────────────────────────
async function analyzeStock(code){
  const startPrice  = dateNDaysAgo(60);
  const startInst   = dateNDaysAgo(20);

  // 同時抓兩個 API
  const [priceData, instData] = await Promise.all([
    fetchFinMind('TaiwanStockPrice', code, startPrice),
    fetchFinMind('TaiwanStockInstitutionalInvestors', code, startInst),
  ]);

  if(!priceData.length) throw new Error('無價格資料');

  // 整理價格
  const prices = priceData.sort((a,b)=>a.date.localeCompare(b.date)).map(p=>({
    date: p.date,
    open: parseFloat(p.open),
    high: parseFloat(p.max),
    low:  parseFloat(p.min),
    close: parseFloat(p.close),
    volume: parseFloat(p.Trading_Volume)/1000, // 張
  }));

  const last = prices[prices.length-1];
  const prev = prices[prices.length-2];
  const chgPct = prev ? ((last.close-prev.close)/prev.close*100) : 0;

  // KDJ
  const { k } = calcKDJ(prices);

  // MA
  const ma5  = calcMA(prices, 5);
  const ma20 = calcMA(prices, 20);

  // 均量（5日）
  const avgVol5 = calcAvgVol(prices, 5);
  const todayVol = last.volume;

  // 均線糾結
  const maGap = (ma5 && ma20) ? Math.abs(ma5 - ma20) / ma20 * 100 : 999;

  // 整理法人資料（投信）
  const instRows = instData.filter(r => r.name && r.name.includes('投信'));
  instRows.sort((a,b)=>a.date.localeCompare(b.date));

  // 投信連買天數
  let buyCons = 0;
  for(let i=instRows.length-1; i>=0; i--){
    const net = (instRows[i].buy||0) - (instRows[i].sell||0);
    if(net > 0) buyCons++;
    else break;
  }

  // 投信持股比例：用累積買超估算（簡化版，FinMind 免費版無直接持股%）
  // 用近 20 天淨買超張數作為代理指標
  const totalNet20 = instRows.reduce((s,r)=>{
    return s + ((r.buy||0)-(r.sell||0));
  }, 0);
  // 如果有 TaiwanStockShareholding 資料會更準，這裡用代理邏輯
  // 暫時用「近20天投信淨買超 < 5000張」代表持股比例尚低
  const instLowHolding = totalNet20 < 5000;

  // ── 積分 ────────────────────────────────────────────
  const s1 = buyCons >= 3;           // 投信連買 ≥ 3天
  const s2 = instLowHolding;         // 投信持股尚低
  const s3 = k < 50;                 // K < 50
  const s4 = avgVol5 && todayVol > avgVol5 * 1.5; // 量 > 均量 1.5倍
  const s5 = maGap < 3;              // 均線糾結

  const score = [s1,s2,s3,s4,s5].filter(Boolean).length;

  return {
    code,
    name: priceData[0]?.stock_name || code,
    price: last.close,
    chgPct,
    k: Math.round(k*10)/10,
    ma5: ma5 ? Math.round(ma5*100)/100 : null,
    ma20: ma20 ? Math.round(ma20*100)/100 : null,
    maGap: Math.round(maGap*10)/10,
    todayVol: Math.round(todayVol),
    avgVol5: avgVol5 ? Math.round(avgVol5) : null,
    buyCons,
    totalNet20: Math.round(totalNet20),
    score,
    criteria: { s1, s2, s3, s4, s5 },
  };
}

// ── 主掃描流程 ──────────────────────────────────────────
let scanResults = JSON.parse(localStorage.getItem('scan_results_b') || '[]');

async function startScan(){
  const token = getToken();
  if(!token){ showError('請先輸入 FinMind Token'); return; }

  const codes = parseWatchlist();
  if(!codes.length){ showError('請輸入至少一支股票代號'); return; }
  if(codes.length > 20){ showError('建議不超過 20 支，避免超過 API 限制'); return; }

  document.getElementById('scan-btn').disabled = true;
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('result-zone').style.display = 'none';
  document.getElementById('error-area').innerHTML = '';

  const results = [];
  const errors  = [];

  for(let i=0; i<codes.length; i++){
    const code = codes[i];
    updateProgress(i, codes.length, `分析中 ${code}...`);
    try{
      const r = await analyzeStock(code);
      results.push(r);
    } catch(e){
      errors.push(`${code}: ${e.message}`);
    }
    await sleep(600); // 避免超過 API rate limit
  }

  updateProgress(codes.length, codes.length, '掃描完成！');

  // 儲存結果
  localStorage.setItem('scan_results_b', JSON.stringify(results));
  scanResults = results;

  renderResults(results, errors);
  document.getElementById('scan-btn').disabled = false;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function updateProgress(done, total, msg){
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-text').textContent = msg + ` (${done}/${total})`;
}

// ── 渲染結果 ─────────────────────────────────────────────
function renderResults(results, errors=[]){
  document.getElementById('result-zone').style.display = 'block';

  if(errors.length){
    showError(errors.map(e=>`⚠ ${e}`).join('<br>'));
  }

  results.sort((a,b)=>b.score-a.score);

  const z5 = results.filter(r=>r.score===5);
  const z4 = results.filter(r=>r.score===4);
  const z3 = results.filter(r=>r.score<=3);

  // summary
  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-item"><span class="summary-label">掃描數量</span><span class="summary-val">${results.length} 支</span></div>
    <div class="summary-item"><span class="summary-label">🏆 5分</span><span class="summary-val gold">${z5.length} 支</span></div>
    <div class="summary-item"><span class="summary-label">⚔️ 4分</span><span class="summary-val green">${z4.length} 支</span></div>
    <div class="summary-item"><span class="summary-label">📋 3分以下</span><span class="summary-val">${z3.length} 支</span></div>
    <div class="summary-item"><span class="summary-label">掃描時間</span><span class="summary-val">${new Date().toLocaleTimeString('zh-TW')}</span></div>
  `;

  document.getElementById('count5').textContent = `共 ${z5.length} 支`;
  document.getElementById('count4').textContent = `共 ${z4.length} 支`;
  document.getElementById('count3').textContent = `共 ${z3.length} 支`;

  document.getElementById('cards5').innerHTML = z5.map(renderCard).join('') || emptyState('目前無 5 分股');
  document.getElementById('cards4').innerHTML = z4.map(renderCard).join('') || emptyState('目前無 4 分股');
  document.getElementById('cards3').innerHTML = z3.map(renderCard).join('') || '';

  document.getElementById('zone5').style.display = z5.length ? 'block' : 'none';
  document.getElementById('zone4').style.display = z4.length ? 'block' : 'none';
  document.getElementById('zone3').style.display = z3.length ? 'block' : 'none';
}

function renderCard(r){
  const sc = r.score;
  const badgeClass = sc>=5?'s5':sc>=4?'s4':'s3';
  const cardClass  = sc>=5?'score-5':sc>=4?'score-4':'';
  const chgUp = r.chgPct >= 0;
  const fire  = r.buyCons >= 5 ? '🔥' : '';

  const criteria = [
    { label:`投信連買${r.buyCons}天`, pass: r.criteria.s1 },
    { label:`投信持股尚低`, pass: r.criteria.s2 },
    { label:`K=${r.k}`, pass: r.criteria.s3 },
    { label:`量比${r.avgVol5?Math.round(r.todayVol/r.avgVol5*10)/10:'—'}倍`, pass: r.criteria.s4 },
    { label:`均線差${r.maGap}%`, pass: r.criteria.s5 },
  ];

  const chips = criteria.map(c=>
    `<span class="chip ${c.pass?'pass':'fail'}">${c.label}</span>`
  ).join('');

  const volWarning = r.todayVol < 500 ? '<span style="font-size:10px;color:var(--text3);margin-left:4px;">輕量級⚠</span>' : '';

  return `
  <div class="stock-card ${cardClass}">
    <div class="card-top">
      <div>
        <div class="card-id">${r.code}</div>
        <div class="card-name">${r.name}${volWarning}</div>
      </div>
      <div style="text-align:right;">
        <div class="score-badge ${badgeClass}">${sc}/5${fire}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px;">${'★'.repeat(sc)}${'☆'.repeat(5-sc)}</div>
      </div>
    </div>
    <div class="card-price-row">
      <span class="card-price">${r.price}</span>
      <span class="card-chg ${chgUp?'up':'dn'}">${chgUp?'+':''}${r.chgPct.toFixed(2)}%</span>
    </div>
    <div class="criteria-row">${chips}</div>
    <div class="card-footer">
      <div class="card-meta">MA5 ${r.ma5||'—'} / MA20 ${r.ma20||'—'} / 今量 ${r.todayVol}張</div>
      <button class="btn-add" onclick="addToA('${r.code}')">+ 加入A板</button>
    </div>
  </div>`;
}

function emptyState(msg){
  return `<div class="empty-state"><div class="empty-icon">🔍</div>${msg}</div>`;
}

function addToA(code){
  // 把代號寫進 localStorage，儀表板 A 可以讀取
  const list = JSON.parse(localStorage.getItem('watchlist_a_pending') || '[]');
  if(!list.includes(code)) list.push(code);
  localStorage.setItem('watchlist_a_pending', JSON.stringify(list));
  alert(`${code} 已加入儀表板 A 待新增清單！\n開啟儀表板 A 後手動輸入代號即可。`);
}

function showError(msg){
  document.getElementById('error-area').innerHTML = `<div class="error-msg">${msg}</div>`;
}

function clearResults(){
  document.getElementById('result-zone').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('error-area').innerHTML = '';
  localStorage.removeItem('scan_results_b');
}

// 頁面載入時，如果有上次結果就顯示
window.addEventListener('load', ()=>{
  const saved = localStorage.getItem('scan_results_b');
  if(saved){
    try{
      const results = JSON.parse(saved);
      if(results.length) renderResults(results);
    } catch(e){}
  }
});
</script>
</body>
</html>
