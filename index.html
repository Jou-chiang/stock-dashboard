<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股技術分析儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0e10;--bg2:#131619;--bg3:#1a1e22;--bg4:#212730;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaed;--text2:#8b9099;--text3:#565c66;
  --amber:#f0a03a;--amber2:#7a4e12;
  --green:#3fc97c;--red:#f25f5f;--blue:#5ba3f5; 
  --purple:#b072f2; --neon:#00e5ff; --warn:#ff6d00;
  --mono:'IBM Plex Mono',monospace;--sans:'Noto Sans TC',sans-serif;
  --r:6px;--rl:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:999;}
.layout{max-width:1600px;margin:0 auto;padding:0 20px 48px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-bottom:1px solid var(--border);margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.brand-title{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--amber);}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.07em;margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ts{font-family:var(--mono);font-size:11px;color:var(--text3);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);display:inline-block;}
.dot.active{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot.loading{background:var(--amber);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.notice{border-radius:var(--rl);padding:12px 18px;margin-bottom:18px;font-size:12px;font-family:var(--mono);}
.notice.ok{background:rgba(63,201,124,.06);border:1px solid rgba(63,201,124,.25);color:var(--green);}
.notice.warn{background:rgba(240,160,58,.07);border:1px solid var(--amber2);color:var(--amber);}
.notice span{color:var(--text2);}
.token-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:14px 18px;margin-bottom:14px;}
.token-label{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.07em;margin-bottom:8px;}
.token-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.token-input{flex:1;min-width:200px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px;outline:none;transition:border-color .2s;}
.token-input:focus{border-color:var(--amber);}
.token-hint{font-size:11px;color:var(--text3);margin-top:8px;}
.token-hint a{color:var(--amber);text-decoration:none;}
.token-status{font-size:11px;font-family:var(--mono);color:var(--text3);}
.token-status.ok{color:var(--green);}
.token-status.warn{color:var(--amber);}
.controls{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex-shrink:0;}
.sym-input{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;width:210px;outline:none;transition:border-color .2s;}
.sym-input:focus{border-color:var(--amber);}
.sym-input::placeholder{color:var(--text3);font-size:12px;}
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;width:290px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);z-index:100;max-height:260px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.autocomplete.show{display:block;}
.ac-item{padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.sel{
