<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股技術分析戰情室</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e10;--bg2:#131619;--bg3:#1a1e22;--border:rgba(255,255,255,0.08);--text:#e8eaed;--text2:#8b9099;--amber:#f0a03a;--green:#3fc97c;--red:#f25f5f;--blue:#5ba3f5;--purple:#b072f2;--r:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:13px;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:999;}
.layout{max-width:1500px;margin:0 auto;padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.brand{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;color:var(--amber);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text2);display:inline-block;margin-right:5px;}
.dot.active{background:var(--green);box-shadow:0 0 8px var(--green);}
.notice{background:rgba(240,160,58,0.08);border:1px solid rgba(240,160,58,0.2);padding:12px;border-radius:var(--r);margin-bottom:20px;font-size:12px;color:var(--amber);}
.controls{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.input-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:8px 15px;width:200px;outline:none;}
.btn{background:transparent;border:1px solid var(--amber);color:var(--amber);padding:8px 16px;border-radius:var(--r);cursor:pointer;font-size:12px;transition:0.2s;}
.btn:hover{background:rgba(240,160,58,0.15);}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;min-width:1250px;}
th,td{padding:12px 10px;text-align:right;border-bottom:1px solid var(--border);}
th{background:var(--bg3);color:var(--text2);font-size:11px;font-weight:400;}
.up{color:var(--red);}.dn{color:var(--green);}
.signal{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid;}
.sig-exit{background:rgba(242,95,95,0.1);border-color:var(--red);color:var(--red);}
.sig-obs{background:rgba(240,160,58,0.1);border-color:var(--amber);color:var(--amber);}
.cost-input{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);width:70px;padding:3px;text-align:right;}
.rt-tag{font-size:9px;margin-left:3px;}
.rt-live{color:var(--green);}.rt-min{color:var(--blue);}
</style>
</head>
<body>
<div class="layout">
  <div class="header">
    <div class="brand">JIANG ROU STRATEGIC DASHBOARD</div>
    <div><span class="dot" id="dot"></span><span id="ts" style="font-family:monospace;font-size:11px;color:var(--text2)">READY</span> <button class="btn" onclick="fetchAll()" style="margin-left:10px">REFRESH</button></div>
  </div>
  <div class="notice">💡 <b>PM 實戰邏輯：</b>強勢噴發標記「觀察」；獲利 > 20% 且鈍化結束或破 MA5 時提醒「減碼/跑一半」。</div>
  <div class="controls">
    <input class="input-box" id="si" type="text" placeholder="代號 (例: 2330)" />
    <button class="btn" onclick="addStock(document.getElementById('si').value)">＋ 新增</button>
    <button class="btn" onclick="toggleCost()">戰情欄 👁</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th style="text-align:left">代號</th><th>股價</th><th>漲跌%</th><th>K</th><th>D</th><th>J</th><th>MA5</th><th>成本</th><th>損益%</th><th>建議買點</th><th style="text-align:center">訊號</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script>
const FM = 'https://api.finmindtrade.com/api/v4/data';
let stocks = JSON.parse(localStorage.getItem('twstk10')||'["2605","2481","6213","2317","2303"]');
let data = {};
const getCost=(s)=>parseFloat(localStorage.getItem('cost_'+s)||'0');
const setCost=(s,v)=>{localStorage.setItem('cost_'+s,v);render();};
const toggleCost=()=>{const b=localStorage.getItem('cc')==='1';localStorage.setItem('cc',b?'0':'1');render();};
const calcKDJ=(h,l,c)=>{let K=50,D=50,jArr=[];for(let i=8;i<c.length;i++){const hi=Math.max(...h.slice(i-8,i+1)),lo=Math.min(...l.slice(i-8,i+1)),rsv=hi===lo?50:(c[i]-lo)/(hi-lo)*100;K=K*2/3+rsv/3;D=D*2/3+K/3;jArr.push(3*K-2*D);}return{K,D,J:jArr[jArr.length-1],jArr};};
async function fetchOne(sym){
  const tok=localStorage.getItem('fm_token');if(!tok)return;
  try{
    const r=await fetch(`${FM}?dataset=TaiwanStockPrice&data_id=${sym}&start_date=2025-01-01&token=${tok}`);
    const j=await r.json();const d=j.data.sort((a,b)=>a.date.localeCompare(b.date));
    const cls=d.map(s=>+s.close),hi=d.map(s=>+s.max),lo=d.map(s=>+s.min);
    const last=cls[cls.length-1],prev=cls[cls.length-2],ma5=cls.slice(-5).reduce((a,b)=>a+b)/5;
    const kdj=calcKDJ(hi,lo,cls);let finalP=last,rt='min';
    try{const pr=await fetch('prices.json?_='+Date.now());const pj=await pr.json();const e=pj.prices.find(x=>x.id===sym);if(e&&e.price){finalP=e.price;rt=e.is_realtime?'live':'close';}}catch(e){}
    let sig='neutral';if(kdj.J>100)sig=(kdj.jArr.slice(-3).every(v=>v>100))?'high-dullness':'initial-spurt';else if(kdj.J<100&&kdj.jArr[kdj.jArr.length-2]>100)sig='dullness-end';
    if(finalP<ma5)sig='trend-weakening';
    data[sym]={price:finalP,chg:((finalP-prev)/prev)*100,K:kdj.K,D:kdj.D,J:kdj.J,MA5:ma5,rtType:rt,signal:sig};
    document.getElementById('ts').textContent='UPDATED: '+new Date().toLocaleTimeString();
    document.getElementById('dot').className='dot active';render();
  }catch(e){console.error(e);}
}
function fmtAdvice(p,ma5,sig,sym){
  const cost=getCost(sym),hasCost=cost>0,roi=hasCost?(p-cost)/cost*100:0;
  if(sig==='initial-spurt')return `<span class="signal sig-obs">短線觀察</span>`;
  if(hasCost){
    if(roi>=20&&sig==='dullness-end')return `<span class="signal sig-exit">獲利>20% 減碼</span>`;
    if(p<ma5)return `<span class="signal sig-exit">破MA5 跑一半</span>`;
    return `<span style="color:var(--text2)">持股中</span>`;
  }
  return `<span style="color:var(--text2)">${p<ma5?'趨勢轉弱 勿追':'—'}</span>`;
}
function render(){
  const tb=document.getElementById('tbody'),showCC=localStorage.getItem('cc')==='1';
  tb.innerHTML=stocks.map(s=>{
    const d=data[s];if(!d)return `<tr><td>${s}</td><td colspan="10">LOADING...</td></tr>`;
    const cost=getCost(s),roi=cost>0?((d.price-cost)/cost*100):0;
    return `<tr><td style="text-align:left;color:var(--amber)">${s}</td><td class="${d.chg>0?'up':'dn'}">${d.price.toFixed(2)}${d.rtType==='live'?'<span class="rt-tag rt-live">●</span>':''}</td><td class="${d.chg>0?'up':'dn'}">${d.chg.toFixed(2)}%</td><td>${d.K.toFixed(1)}</td><td>${d.D.toFixed(1)}</td><td class="${d.J>100?'up':''}">${d.J.toFixed(1)}</td><td>${d.MA5.toFixed(1)}</td><td style="${showCC?'':'display:none'}"><input class="cost-input" value="${cost||''}" onchange="setCost('${s}',this.value)"></td><td style="${showCC?'':'display:none'}" class="${roi>=0?'up':'dn'}">${cost>0?roi.toFixed(1)+'%':'—'}</td><td>${fmtAdvice(d.price,d.MA5,d.signal,s)}</td><td style="text-align:center"><span class="signal">${d.signal.replace('-',' ').toUpperCase()}</span></td></tr>`;
  }).join('');
}
function fetchAll(){stocks.forEach(s=>fetchOne(s));}
function addStock(s){if(s&&!stocks.includes(s)){stocks.push(s);localStorage.setItem('twstk10',JSON.stringify(stocks));fetchOne(s);}}
const itk=localStorage.getItem('fm_token');
if(!itk){const t=prompt("江柔，請輸入 Token：");if(t){localStorage.setItem('fm_token',t);fetchAll();}}else{fetchAll();}
</script>
</body>
</html>
